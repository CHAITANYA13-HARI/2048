<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 Pro</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #faf8ef;
}

h1 { margin: 10px; }

.top {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 10px;
}

.box {
  background: #bbada0;
  padding: 10px 20px;
  border-radius: 5px;
  color: white;
}

button {
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.tile {
  width: 80px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: bold;
  border-radius: 5px;
  background: #cdc1b4;
  transition: all 0.15s ease;
  transform: scale(1);
}

.tile.new {
  animation: pop 0.2s;
}

@keyframes pop {
  0% { transform: scale(0.5); }
  100% { transform: scale(1); }
}

.overlay {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(238,228,218,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  font-size:30px;
  flex-direction:column;
}
</style>

</head>
<body>

<h1>2048</h1>

<div class="top">
  <div class="box">Score<br><span id="score">0</span></div>
  <div class="box">Best<br><span id="best">0</span></div>
</div>

<button onclick="restart()">Restart</button>

<div class="grid" id="grid"></div>

<div class="overlay" id="gameOver">
  Game Over 😢
  <button onclick="restart()">Try Again</button>
</div>

<script>
let grid = new Array(16).fill(0);
let score = 0;
let best = localStorage.getItem("best2048") || 0;

document.getElementById("best").innerText = best;

function getColor(v){
  return {
    0:"#cdc1b4",
    2:"#eee4da",4:"#ede0c8",8:"#f2b179",
    16:"#f59563",32:"#f67c5f",64:"#f65e3b",
    128:"#edcf72",256:"#edcc61",512:"#edc850",
    1024:"#edc53f",2048:"#edc22e"
  }[v] || "#3c3a32";
}

function draw(newIndex=-1){
  let g = document.getElementById("grid");
  g.innerHTML="";
  grid.forEach((v,i)=>{
    let d=document.createElement("div");
    d.className="tile";
    if(i===newIndex) d.classList.add("new");
    d.innerText = v || "";
    d.style.background = getColor(v);
    d.style.color = v>4 ? "#fff" : "#776e65";
    g.appendChild(d);
  });

  document.getElementById("score").innerText = score;
  document.getElementById("best").innerText = best;
}

function addTile(){
  let empty = grid.map((v,i)=>v===0?i:null).filter(v=>v!==null);
  if(empty.length===0) return -1;
  let i = empty[Math.floor(Math.random()*empty.length)];
  grid[i] = Math.random()<0.9 ? 2 : 4;
  return i;
}

function slide(row){
  row = row.filter(v=>v);
  for(let i=0;i<row.length-1;i++){
    if(row[i]===row[i+1]){
      row[i]*=2;
      score += row[i];
      row[i+1]=0;
    }
  }
  row = row.filter(v=>v);
  while(row.length<4) row.push(0);
  return row;
}

function move(fn){
  let old = grid.toString();
  fn();
  if(grid.toString()!=old){
    let i = addTile();
    if(score > best){
      best = score;
      localStorage.setItem("best2048", best);
    }
    draw(i);
    checkGameOver();
  }
}

function moveLeft(){
  move(()=>{
    for(let i=0;i<4;i++){
      let row = grid.slice(i*4,i*4+4);
      row = slide(row);
      for(let j=0;j<4;j++) grid[i*4+j]=row[j];
    }
  });
}

function moveRight(){
  move(()=>{
    for(let i=0;i<4;i++){
      let row = grid.slice(i*4,i*4+4).reverse();
      row = slide(row).reverse();
      for(let j=0;j<4;j++) grid[i*4+j]=row[j];
    }
  });
}

function moveUp(){
  move(()=>{
    for(let i=0;i<4;i++){
      let col = [grid[i],grid[i+4],grid[i+8],grid[i+12]];
      col = slide(col);
      for(let j=0;j<4;j++) grid[i+j*4]=col[j];
    }
  });
}

function moveDown(){
  move(()=>{
    for(let i=0;i<4;i++){
      let col = [grid[i],grid[i+4],grid[i+8],grid[i+12]].reverse();
      col = slide(col).reverse();
      for(let j=0;j<4;j++) grid[i+j*4]=col[j];
    }
  });
}

function checkGameOver(){
  if(grid.includes(0)) return;

  for(let i=0;i<4;i++){
    for(let j=0;j<4;j++){
      let v = grid[i*4+j];
      if(j<3 && v===grid[i*4+j+1]) return;
      if(i<3 && v===grid[(i+1)*4+j]) return;
    }
  }

  document.getElementById("gameOver").style.display="flex";
}

function restart(){
  grid = new Array(16).fill(0);
  score = 0;
  document.getElementById("gameOver").style.display="none";
  addTile(); addTile();
  draw();
}

// Keyboard
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft") moveLeft();
  if(e.key==="ArrowRight") moveRight();
  if(e.key==="ArrowUp") moveUp();
  if(e.key==="ArrowDown") moveDown();
});

// Touch
let startX, startY;
document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{
  let dx = e.changedTouches[0].clientX - startX;
  let dy = e.changedTouches[0].clientY - startY;

  if(Math.abs(dx) > Math.abs(dy)){
    if(dx > 50) moveRight();
    else if(dx < -50) moveLeft();
  } else {
    if(dy > 50) moveDown();
    else if(dy < -50) moveUp();
  }
});

// Init
restart();
</script>

</body>
</html>
