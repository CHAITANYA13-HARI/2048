<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 Game</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #faf8ef;
}
h1 { margin: 10px; }

.grid {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.tile {
  width: 80px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: bold;
  border-radius: 5px;
  background: #cdc1b4;
  transition: 0.2s;
}
</style>
</head>
<body>

<h1>2048</h1>
<div class="grid" id="grid"></div>

<script>
let grid = new Array(16).fill(0);

function getColor(v){
  return {
    0:"#cdc1b4",
    2:"#eee4da",4:"#ede0c8",8:"#f2b179",
    16:"#f59563",32:"#f67c5f",64:"#f65e3b",
    128:"#edcf72",256:"#edcc61",512:"#edc850",
    1024:"#edc53f",2048:"#edc22e"
  }[v] || "#3c3a32";
}

function draw(){
  let g = document.getElementById("grid");
  g.innerHTML="";
  grid.forEach(v=>{
    let d=document.createElement("div");
    d.className="tile";
    d.innerText = v || "";
    d.style.background = getColor(v);
    d.style.color = v>4 ? "#fff" : "#776e65";
    g.appendChild(d);
  });
}

function addTile(){
  let empty = grid.map((v,i)=>v===0?i:null).filter(v=>v!==null);
  if(empty.length===0) return;
  let i = empty[Math.floor(Math.random()*empty.length)];
  grid[i] = Math.random()<0.9 ? 2 : 4;
}

function slide(row){
  row = row.filter(v=>v);
  for(let i=0;i<row.length-1;i++){
    if(row[i]===row[i+1]){
      row[i]*=2;
      row[i+1]=0;
    }
  }
  row = row.filter(v=>v);
  while(row.length<4) row.push(0);
  return row;
}

function moveLeft(){
  let old = grid.toString();
  for(let i=0;i<4;i++){
    let row = grid.slice(i*4,i*4+4);
    row = slide(row);
    for(let j=0;j<4;j++) grid[i*4+j]=row[j];
  }
  if(grid.toString()!=old){
    addTile(); draw();
  }
}

function moveRight(){
  let old = grid.toString();
  for(let i=0;i<4;i++){
    let row = grid.slice(i*4,i*4+4).reverse();
    row = slide(row).reverse();
    for(let j=0;j<4;j++) grid[i*4+j]=row[j];
  }
  if(grid.toString()!=old){
    addTile(); draw();
  }
}

function moveUp(){
  let old = grid.toString();
  for(let i=0;i<4;i++){
    let col = [grid[i],grid[i+4],grid[i+8],grid[i+12]];
    col = slide(col);
    for(let j=0;j<4;j++) grid[i+j*4]=col[j];
  }
  if(grid.toString()!=old){
    addTile(); draw();
  }
}

function moveDown(){
  let old = grid.toString();
  for(let i=0;i<4;i++){
    let col = [grid[i],grid[i+4],grid[i+8],grid[i+12]].reverse();
    col = slide(col).reverse();
    for(let j=0;j<4;j++) grid[i+j*4]=col[j];
  }
  if(grid.toString()!=old){
    addTile(); draw();
  }
}

// Keyboard controls
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft") moveLeft();
  if(e.key==="ArrowRight") moveRight();
  if(e.key==="ArrowUp") moveUp();
  if(e.key==="ArrowDown") moveDown();
});

// Touch controls
let startX, startY;
document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{
  let dx = e.changedTouches[0].clientX - startX;
  let dy = e.changedTouches[0].clientY - startY;

  if(Math.abs(dx) > Math.abs(dy)){
    if(dx > 50) moveRight();
    else if(dx < -50) moveLeft();
  } else {
    if(dy > 50) moveDown();
    else if(dy < -50) moveUp();
  }
});

// Init
addTile();
addTile();
draw();
</script>

</body>
</html>
